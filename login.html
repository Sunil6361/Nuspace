<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="web.css">
</head>
<body>

<section class="contact" style="height:100vh; display:flex; align-items:center;">
    <form id="loginForm">

        <h2 style="text-align:center; margin-bottom:20px;">
            Admin Login
        </h2>

        <input type="email"
               id="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               id="password"
               placeholder="Enter Password"
               required>

              

<div class="forgot-password">
    <a href="#" id="forgotPassword">Forgot Password?</a>
</div>

        <button type="submit">
            Login
        </button>

    </form>
</section>



<!-- ================= FORGOT PASSWORD MODAL ================= -->

<div id="forgotModal" class="modal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <h2>Forgot Password</h2>

        <input
    type="email"
    id="forgotEmail"
    placeholder="Enter Registered Email">

<button id="sendOtpBtn">
    Send OTP
</button>

<!-- OTP Section -->

<div id="otpSection" style="display:none; margin-top:20px;">

    <input
        type="text"
        id="otp"
        placeholder="Enter OTP">

    <input
        type="password"
        id="newPassword"
        placeholder="New Password">

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

    <button id="resetPasswordBtn">
        Reset Password
    </button>

</div>

    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("http://localhost:5000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (data.success) {
        alert("Login Successful");
        localStorage.setItem("adminEmail", email);
        window.location.href = "dashboard.html";
    } else {
        alert(data.message);
    }
});

// Open Forgot Password Modal
document.getElementById("forgotPassword").addEventListener("click", function(e) {

    e.preventDefault();

    document.getElementById("forgotModal").style.display = "block";

});

// Close Forgot Password Modal
document.querySelector(".close").addEventListener("click", function() {

    document.getElementById("forgotModal").style.display = "none";

});

// Close when clicking outside the modal
window.addEventListener("click", function(e) {

    if (e.target == document.getElementById("forgotModal")) {

        document.getElementById("forgotModal").style.display = "none";

    }

});

// Send OTP
document.getElementById("sendOtpBtn").addEventListener("click", async function () {

    const email = document.getElementById("forgotEmail").value;

    if (!email) {
        alert("Please enter your registered email.");
        return;
    }

    try {

        const response = await fetch("http://localhost:5000/forgot-password", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                email
            })

        });

        const data = await response.json();

        alert(data.message);

        if (data.success) {

            document.getElementById("otpSection").style.display = "block";

        }

    } catch (error) {

        console.log(error);

        alert("Something went wrong!");

    }

});
// ================= RESET PASSWORD =================

document.getElementById("resetPasswordBtn").addEventListener("click", async function () {

    const email = document.getElementById("forgotEmail").value;
    const otp = document.getElementById("otp").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!otp || !newPassword || !confirmPassword) {

        alert("Please fill all fields.");
        return;

    }

    if (newPassword !== confirmPassword) {

        alert("Passwords do not match.");
        return;

    }
    

    const response = await fetch("http://localhost:5000/reset-password", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

       body: JSON.stringify({
    email,
    otp,
    newPassword
})

    });

    const data = await response.json();

    alert(data.message);

if (data.success) {

    // Close popup
    document.getElementById("forgotModal").style.display = "none";

    // Hide OTP section
    document.getElementById("otpSection").style.display = "none";

    // Clear all fields
    document.getElementById("forgotEmail").value = "";
    document.getElementById("otp").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";

}

});
</script>
</body>
</html>
