<!DOCTYPE html>
<html>
<head>
    <title>Admin Registration</title>
    <link rel="stylesheet" href="web.css">
</head>
<body>

<section class="contact" style="height:100vh; display:flex; align-items:center;">

<form id="registerForm">

    <h2 style="text-align:center; margin-bottom:20px;">
        Admin Registration
    </h2>

    <input
        type="text"
        id="name"
        placeholder="Enter Name"
        required>

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required>

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required>

    <button type="submit">
        Register
    </button>

</form>

</section>

<script src="register.js"></script>

</body>
</html>
